name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast feedback: the publish/verify pipeline + contract are stdlib-only, so
  # they run in seconds without pulling torch.
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pytest
      - name: Pipeline + contract tests
        run: PYTHONPATH=src pytest tests/test_publish.py tests/test_checks.py tests/test_schema.py tests/test_setup.py tests/test_web_growth_forms.py tests/test_receipt.py tests/test_m14_release.py
      - name: Verify milestones reproduce their numbers
        run: PYTHONPATH=src python -m lab.cli verify
      - name: pot.json is in sync with MILESTONES.md
        run: |
          PYTHONPATH=src python - <<'PY'
          import json, sys
          from pathlib import Path
          sys.path.insert(0, "src")
          from lab.publish import parse_milestones
          fresh = parse_milestones(Path("MILESTONES.md").read_text())
          committed = json.loads(Path("pot.json").read_text())["milestones"]
          if fresh != committed:
              print("::error::pot.json is stale — run `lab publish` and commit it")
              sys.exit(1)
          print(f"pot.json in sync ({len(fresh)} milestones)")
          PY

  # The windowsill page's growth-form registry (pluggable plant shapes behind one
  # interface). Pure JS, no DOM — runs in node's built-in test runner in seconds.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Growth-form registry tests
        run: node --test web/growth-forms.test.mjs
      # web/index.html is mirrored verbatim into brokenbranchdevwebsite, whose CI
      # validates it. Gate it here with the same html-validate config so the mirror
      # can never push HTML the downstream site rejects (which silently reds its main).
      - name: HTML validation (windowsill page — mirror target's gate)
        run: npx --yes html-validate@9.7.1 web/index.html

  # The numerical physics tests need the full scientific stack. Run the whole
  # CPU suite: a green workflow must mean the same thing as "all tests passed",
  # not a hand-picked 42% subset that omits newer milestone engines.
  physics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install project with CPU torch
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2.4" --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Full CPU test suite
        run: PYTHONPATH=src pytest -q
      # Determinism gate: re-run the pinned L=16 seed=42 CPU smoke config and prove
      # it reproduces itself byte-for-byte AND agrees with the committed golden. This
      # is the one step that actually exercises the engine end-to-end (the pipeline
      # job only regrades saved JSON), so a silently nondeterministic instrument reds
      # here instead of shipping green.
      - name: Determinism gate (golden-seed smoke rerun)
        run: PYTHONPATH=src python -m lab.cli verify --rerun-smoke
