# Mirror the canonical seed-in-the-pot page to brokenbranch.dev.
#
# web/index.html in THIS repo is the single source of truth. Whenever it changes
# on main, copy it into the website repo so the hosted surface
# (brokenbranch.dev/windowsill) always matches what people download here.
#
# Setup (one time): add a repo secret named SITE_SYNC_TOKEN — a fine-grained
# Personal Access Token scoped to benskamps/brokenbranchdevwebsite with
# "Contents: Read and write". Nothing else is needed.
name: Mirror page to brokenbranch.dev

on:
  push:
    branches: [main]
    paths:
      - web/index.html
      - .github/workflows/mirror-page.yml
  workflow_dispatch: {}   # manual "sync now" button

permissions:
  contents: read

concurrency:
  group: mirror-page
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the lab (source of truth)
        uses: actions/checkout@v4

      - name: Check out the website (mirror target)
        uses: actions/checkout@v4
        with:
          repository: benskamps/brokenbranchdevwebsite
          token: ${{ secrets.SITE_SYNC_TOKEN }}
          path: site

      - name: Copy the page across
        run: cp web/index.html site/windowsill/index.html

      - name: Commit & push only if it actually changed
        working-directory: site
        run: |
          # Author as Ben (an authorized Vercel team member). Vercel promotes a
          # production deploy only for commits whose author it recognizes as a
          # team member; commits authored by "windowsill-bot" landed in the
          # BLOCKED state and never went live, so the mirrored page silently
          # froze. The push still uses SITE_SYNC_TOKEN; only the commit author
          # changes. (If Vercel's protection is GPG-based rather than author-
          # based this won't unblock it — then flip the project's deploy
          # protection setting instead.)
          git config user.name "Ben Schippers"
          git config user.email "benjamin.schippers@outlook.com"
          if git diff --quiet -- windowsill/index.html; then
            echo "site already matches web/index.html — nothing to mirror"
            exit 0
          fi
          git add windowsill/index.html
          git commit -m "chore(windowsill): mirror web/index.html from windowsill-lab@${GITHUB_SHA::7}"
          git push
